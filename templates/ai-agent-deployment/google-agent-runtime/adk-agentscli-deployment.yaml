template:
  name: Agents CLI ADK Deploy to Agent Runtime
  identifier: Agents_CLI_ADK_Deploy_to_Agent_Runtime
  versionLabel: v1
  type: Pipeline
  projectIdentifier: akshitdevrelharness
  orgIdentifier: default
  tags: {}
  spec:
    properties:
      ci:
        codebase:
          connectorRef: <+input>
          repoName: <+input>
          build: <+input>
    stages:
      - stage:
          name: Build Test and Deploy
          identifier: build_test_deploy
          description: ""
          type: CI
          spec:
            cloneCodebase: true
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    type: Run
                    name: Setup GCP Credentials
                    identifier: setup_gcp_credentials
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Writing GCP service account key ==="
                        echo '<+secrets.getValue("gcp_sa_key_json")>' > /tmp/gcp-sa-key.json
                        chmod 600 /tmp/gcp-sa-key.json

                        GCP_PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-sa-key.json'))['project_id'])")
                        GCP_REGION="<+secrets.getValue("gcp_region")>"
                        GCP_REGION="${GCP_REGION:-us-east1}"
                        GCP_BUCKET="<+secrets.getValue("gcp_storage_bucket")>"

                        echo "=== Activating service account via gcloud ==="
                        gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json --project="$GCP_PROJECT"
                        gcloud config set project "$GCP_PROJECT"

                        echo "=== Writing shared env file ==="
                        cat > /tmp/gcp-env.sh <<EOF
                        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
                        export GOOGLE_GENAI_USE_VERTEXAI=true
                        export GOOGLE_CLOUD_PROJECT=$GCP_PROJECT
                        export GOOGLE_CLOUD_LOCATION=$GCP_REGION
                        export GOOGLE_CLOUD_STORAGE_BUCKET=$GCP_BUCKET
                        EOF
                        sed -i 's/^[[:space:]]*//' /tmp/gcp-env.sh

                        echo "=== Generating project .env for ADK/tests ==="
                        cat > .env <<DOTENV
                        GOOGLE_GENAI_USE_VERTEXAI=1
                        GOOGLE_CLOUD_PROJECT=$GCP_PROJECT
                        GOOGLE_CLOUD_LOCATION=$GCP_REGION
                        GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
                        DOTENV
                        sed -i 's/^[[:space:]]*//' .env

                        echo "Configured for project: $GCP_PROJECT, region: $GCP_REGION"
                        gcloud auth list
                - step:
                    type: Run
                    name: Validate Project Structure
                    identifier: validate_project_structure
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Validating Agents CLI ADK project structure ==="
                        ERRORS=0

                        if [ ! -f "agents-cli-manifest.yaml" ]; then
                          echo "FAIL: agents-cli-manifest.yaml not found. Is this an agents-cli project?"
                          exit 1
                        fi
                        echo "  OK: agents-cli-manifest.yaml"

                        AGENT_DIR=$(grep '^agent_directory:' agents-cli-manifest.yaml | awk '{print $2}' | tr -d '"')
                        if [ -z "$AGENT_DIR" ]; then
                          echo "FAIL: Could not read agent_directory from agents-cli-manifest.yaml"
                          exit 1
                        fi
                        echo "  OK: agent_directory = $AGENT_DIR"
                        echo "$AGENT_DIR" > /tmp/agent_directory.txt

                        DEPLOY_TARGET=$(grep 'deployment_target:' agents-cli-manifest.yaml | awk '{print $2}' | tr -d '"')
                        if [ "$DEPLOY_TARGET" != "agent_runtime" ]; then
                          echo "FAIL: deployment_target is '$DEPLOY_TARGET', expected 'agent_runtime'"
                          ERRORS=$((ERRORS + 1))
                        else
                          echo "  OK: deployment_target = agent_runtime"
                        fi

                        for f in "pyproject.toml" "uv.lock"; do
                          if [ ! -f "$f" ]; then
                            echo "FAIL: Missing $f"
                            ERRORS=$((ERRORS + 1))
                          else
                            echo "  OK: $f"
                          fi
                        done

                        for f in "$AGENT_DIR/__init__.py" "$AGENT_DIR/agent.py" "$AGENT_DIR/prompt.py"; do
                          if [ ! -f "$f" ]; then
                            echo "FAIL: Missing $f"
                            ERRORS=$((ERRORS + 1))
                          else
                            echo "  OK: $f"
                          fi
                        done

                        if [ ! -f "$AGENT_DIR/agent_runtime_app.py" ]; then
                          echo "WARN: Missing $AGENT_DIR/agent_runtime_app.py (may be required for Agent Runtime)"
                        else
                          echo "  OK: $AGENT_DIR/agent_runtime_app.py"
                        fi

                        if [ ! -d "$AGENT_DIR" ]; then
                          echo "FAIL: Agent directory '$AGENT_DIR/' not found"
                          ERRORS=$((ERRORS + 1))
                        fi
                        if [ ! -d "tests" ]; then
                          echo "WARN: tests/ directory not found"
                        else
                          echo "  OK: tests/"
                        fi

                        if grep -q "google-adk" pyproject.toml; then
                          echo "  OK: google-adk dependency present in pyproject.toml"
                        else
                          echo "FAIL: google-adk dependency missing from pyproject.toml"
                          ERRORS=$((ERRORS + 1))
                        fi

                        if grep -q "root_agent\|^app\s*=" "$AGENT_DIR/agent.py"; then
                          echo "  OK: Agent entrypoint found in $AGENT_DIR/agent.py"
                        else
                          echo "FAIL: Neither root_agent nor app found in $AGENT_DIR/agent.py"
                          ERRORS=$((ERRORS + 1))
                        fi

                        if [ $ERRORS -gt 0 ]; then
                          echo ""
                          echo "FAILED: $ERRORS validation error(s) found."
                          exit 1
                        fi

                        echo ""
                        echo "All validations passed for agents-cli project ($AGENT_DIR)."
                - step:
                    type: Run
                    name: Install Dependencies
                    identifier: install_dependencies
                    spec:
                      shell: Bash
                      command: |
                        echo "=== Installing uv ==="
                        curl -LsSf https://astral.sh/uv/install.sh | sh
                        export PATH="$HOME/.local/bin:$PATH"

                        echo "=== Installing Google Agents CLI ==="
                        uv tool install google-agents-cli
                        export PATH="$(uv tool dir)/bin:$PATH"

                        echo "=== Syncing project dependencies ==="
                        SYNC_CMD="uv sync"
                        for group in dev deployment; do
                          if grep -qP "^\[dependency-groups\]" pyproject.toml && grep -qP "^${group}\s*=" pyproject.toml; then
                            SYNC_CMD="$SYNC_CMD --group $group"
                          fi
                        done
                        echo "Running: $SYNC_CMD"
                        $SYNC_CMD

                        echo "=== Verifying adk is available ==="
                        uv run adk --version

                        echo "=== Verifying agents-cli ==="
                        agents-cli info --json

                        echo "Dependencies installed successfully."
                - step:
                    type: Run
                    name: Run Tests
                    identifier: run_tests
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh
                        export PATH="$HOME/.local/bin:$PATH"
                        EXIT_CODE=0

                        if [ -d "tests/unit" ]; then
                          echo "=== Running unit tests ==="
                          uv run pytest tests/unit -v --tb=short || EXIT_CODE=1
                          echo ""
                        fi

                        if [ -d "tests/integration" ]; then
                          echo "=== Running integration tests ==="
                          uv run pytest tests/integration -v --tb=short || EXIT_CODE=1
                          echo ""
                        fi

                        if [ -f "tests/test_agents.py" ]; then
                          echo "=== Running agent tests ==="
                          uv run pytest tests/test_agents.py -v --tb=short || EXIT_CODE=1
                          echo ""
                        fi

                        if [ ! -d "tests/unit" ] && [ ! -d "tests/integration" ] && [ ! -f "tests/test_agents.py" ]; then
                          echo "=== Running all tests ==="
                          uv run pytest tests -v --tb=short || EXIT_CODE=1
                        fi

                        if [ $EXIT_CODE -ne 0 ]; then
                          echo "FAILED: One or more test suites failed."
                          exit 1
                        fi
                        echo "All tests passed."
                - step:
                    type: Run
                    name: Run Evaluations
                    identifier: run_evaluations
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh
                        export PATH="$HOME/.local/bin:$PATH"

                        echo "=== Running agent evaluations ==="

                        EVAL_DIRS=""
                        for candidate in eval tests/eval; do
                          if find "$candidate" -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
                            EVAL_DIRS="$EVAL_DIRS $candidate"
                          fi
                        done

                        if [ -n "$EVAL_DIRS" ]; then
                          echo "Found eval test files in:$EVAL_DIRS"
                          uv run pytest $EVAL_DIRS -v --tb=short || {
                            echo ""
                            echo "WARN: Eval threshold not met (LLM responses are non-deterministic)."
                            echo "This is informational -- evals do not block deployment."
                          }
                          echo "Evaluations completed."
                        else
                          echo "WARN: No evaluation test files found. Skipping."
                        fi
                - step:
                    type: Run
                    name: Capture Current Revision
                    identifier: capture_current_revision
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        echo "=== Discovering current agent resource via REST API ==="
                        ENGINES_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines")

                        RESOURCE_NAME=$(echo "$ENGINES_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        engines = data.get('reasoningEngines', [])
                        if engines:
                            print(engines[-1]['name'])
                        " 2>/dev/null || true)

                        if [ -z "$RESOURCE_NAME" ]; then
                          echo "No existing agent found. First deployment -- skipping revision capture."
                          echo "" > /tmp/old_revision.txt
                          echo "" > /tmp/agent_resource_name.txt
                          exit 0
                        fi

                        echo "$RESOURCE_NAME" > /tmp/agent_resource_name.txt
                        echo "Agent resource: $RESOURCE_NAME"

                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')

                        echo "=== Listing current revisions ==="
                        REVISIONS_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/${RESOURCE_NAME}/runtimeRevisions")

                        OLD_REVISION=$(echo "$REVISIONS_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        revs = data.get('reasoningEngineRuntimeRevisions', [])
                        if revs:
                            revs.sort(key=lambda r: r.get('createTime', ''), reverse=True)
                            print(revs[0]['name'])
                        " 2>/dev/null || true)

                        echo "$OLD_REVISION" > /tmp/old_revision.txt
                        echo "Current active revision: ${OLD_REVISION:-none}"
                - step:
                    type: Run
                    name: Deploy to Agent Runtime
                    identifier: deploy_to_agent_runtime
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh
                        export PATH="$HOME/.local/bin:$PATH"
                        export PATH="$(uv tool dir)/bin:$PATH"

                        echo "=== Deploying agent to Agent Runtime ==="
                        echo "Project: $GOOGLE_CLOUD_PROJECT"
                        echo "Region:  $GOOGLE_CLOUD_LOCATION"

                        agents-cli deploy \
                          --project "$GOOGLE_CLOUD_PROJECT" \
                          --region "$GOOGLE_CLOUD_LOCATION" \
                          --no-confirm-project \
                          2>&1 | tee /tmp/deploy_output.txt
                        DEPLOY_EXIT=${PIPESTATUS[0]}

                        if [ $DEPLOY_EXIT -ne 0 ]; then
                          echo ""
                          echo "FAILED: Deployment to Agent Runtime failed."
                          exit 1
                        fi

                        # Use resource name from Step 6 if available, otherwise discover via REST
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        if [ -z "$RESOURCE_NAME" ]; then
                          API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                          TOKEN=$(gcloud auth print-access-token)
                          RESOURCE_NAME=$(curl -s -X GET \
                            -H "Authorization: Bearer $TOKEN" \
                            "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines" \
                            | python3 -c "
                          import sys, json
                          data = json.load(sys.stdin)
                          engines = data.get('reasoningEngines', [])
                          if engines:
                              print(engines[-1]['name'])
                          " 2>/dev/null || true)
                        fi
                        echo "$RESOURCE_NAME" > /tmp/agent_resource_name.txt

                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        echo "=== Discovering new revision ==="
                        sleep 5
                        REVISIONS_JSON=$(curl -s -X GET \
                          -H "Authorization: Bearer $TOKEN" \
                          "${API_BASE}/${RESOURCE_NAME}/runtimeRevisions")

                        NEW_REVISION=$(echo "$REVISIONS_JSON" | python3 -c "
                        import sys, json
                        data = json.load(sys.stdin)
                        revs = data.get('reasoningEngineRuntimeRevisions', [])
                        if revs:
                            revs.sort(key=lambda r: r.get('createTime', ''), reverse=True)
                            print(revs[0]['name'])
                        " 2>/dev/null || true)

                        echo "$NEW_REVISION" > /tmp/new_revision.txt
                        echo ""
                        echo "Deployment successful."
                        echo "Resource: $RESOURCE_NAME"
                        echo "New revision: $NEW_REVISION"
                - step:
                    type: Run
                    name: Canary Traffic Split
                    identifier: canary_traffic_split
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        OLD_REVISION=$(cat /tmp/old_revision.txt 2>/dev/null || echo "")
                        NEW_REVISION=$(cat /tmp/new_revision.txt 2>/dev/null || echo "")
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        if [ -z "$OLD_REVISION" ] || [ "$OLD_REVISION" = "$NEW_REVISION" ]; then
                          echo "First deployment or single revision -- skipping canary split."
                          echo "Traffic is 100% on latest revision."
                          exit 0
                        fi

                        echo "=== Setting canary traffic: 90% old / 10% new ==="
                        echo "Old: $OLD_REVISION"
                        echo "New: $NEW_REVISION"

                        curl -s -X PATCH \
                          -H "Authorization: Bearer $TOKEN" \
                          -H "Content-Type: application/json" \
                          -d "{
                            \"trafficConfig\": {
                              \"trafficSplitManual\": {
                                \"targets\": [
                                  {\"runtimeRevisionName\": \"$OLD_REVISION\", \"percent\": 90},
                                  {\"runtimeRevisionName\": \"$NEW_REVISION\", \"percent\": 10}
                                ]
                              }
                            }
                          }" \
                          "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                        echo ""
                        echo "Canary split configured: 90% old / 10% new"
                - step:
                    type: Run
                    name: Smoke Test New Revision
                    identifier: smoke_test_new_revision
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh
                        export PATH="$HOME/.local/bin:$PATH"
                        export PATH="$(uv tool dir)/bin:$PATH"

                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")

                        if [ -z "$RESOURCE_NAME" ]; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "FAIL: No agent resource name found."
                          exit 0
                        fi

                        PROJECT_NUM=$(echo "$RESOURCE_NAME" | grep -oP 'projects/\K[^/]+')
                        REGION=$(echo "$RESOURCE_NAME" | grep -oP 'locations/\K[^/]+')
                        ENGINE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        AGENT_URL="https://${REGION}-aiplatform.googleapis.com/v1/projects/${PROJECT_NUM}/locations/${REGION}/reasoningEngines/${ENGINE_ID}"

                        echo "=== Smoke testing deployed agent ==="
                        echo "Agent URL: $AGENT_URL"
                        echo "Sending: 'Hello, what can you help me with?'"
                        echo ""

                        RESPONSE=$(agents-cli run "Hello, what can you help me with?" \
                          --url "$AGENT_URL" \
                          --mode adk \
                          2>&1) || true

                        echo "=== Agent Response ==="
                        echo "$RESPONSE"
                        echo ""

                        if [ -z "$RESPONSE" ]; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "Smoke test FAILED: Empty response."
                          exit 0
                        fi

                        if echo "$RESPONSE" | grep -iq "error\|exception\|traceback\|PERMISSION_DENIED"; then
                          echo "FAIL" > /tmp/smoke_result.txt
                          echo "Smoke test FAILED: Agent returned an error."
                          exit 0
                        fi

                        echo "PASS" > /tmp/smoke_result.txt
                        echo "Smoke test PASSED."
                - step:
                    type: Run
                    name: Promote or Rollback
                    identifier: promote_or_rollback
                    spec:
                      shell: Bash
                      command: |
                        source /tmp/gcp-env.sh

                        SMOKE_RESULT=$(cat /tmp/smoke_result.txt 2>/dev/null || echo "FAIL")
                        OLD_REVISION=$(cat /tmp/old_revision.txt 2>/dev/null || echo "")
                        NEW_REVISION=$(cat /tmp/new_revision.txt 2>/dev/null || echo "")
                        RESOURCE_NAME=$(cat /tmp/agent_resource_name.txt 2>/dev/null || echo "")
                        RESOURCE_ID=$(echo "$RESOURCE_NAME" | grep -oP 'reasoningEngines/\K\S+')
                        API_BASE="https://${GOOGLE_CLOUD_LOCATION}-aiplatform.googleapis.com/v1beta1"
                        TOKEN=$(gcloud auth print-access-token)

                        # --- First deployment (no old revision) ---
                        if [ -z "$OLD_REVISION" ] || [ "$OLD_REVISION" = "$NEW_REVISION" ]; then
                          if [ "$SMOKE_RESULT" = "PASS" ]; then
                            echo "=== First deployment: setting traffic to always-latest ==="
                            curl -s -X PATCH \
                              -H "Authorization: Bearer $TOKEN" \
                              -H "Content-Type: application/json" \
                              -d '{"trafficConfig": {"trafficSplitAlwaysLatest": {}}}' \
                              "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"
                            echo ""
                            echo "Pipeline PASSED. Agent deployed with 100% traffic."
                          else
                            echo "Pipeline FAILED. Smoke test failed on first deployment."
                            echo "Agent is deployed but may not be responding correctly."
                            exit 1
                          fi
                          exit 0
                        fi

                        # --- Subsequent deployments ---
                        if [ "$SMOKE_RESULT" = "PASS" ]; then
                          echo "=== PROMOTING: Smoke test passed ==="
                          echo "Sending 100% traffic to new revision: $NEW_REVISION"

                          curl -s -X PATCH \
                            -H "Authorization: Bearer $TOKEN" \
                            -H "Content-Type: application/json" \
                            -d "{
                              \"trafficConfig\": {
                                \"trafficSplitManual\": {
                                  \"targets\": [
                                    {\"runtimeRevisionName\": \"$NEW_REVISION\", \"percent\": 100}
                                  ]
                                }
                              }
                            }" \
                            "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                          echo ""
                          echo "Pipeline PASSED. New revision promoted to 100% traffic."
                          echo "Resource: $RESOURCE_NAME"
                          echo "Active revision: $NEW_REVISION"
                          echo ""
                          echo "Manual rollback command:"
                          echo "  curl -X PATCH -H 'Authorization: Bearer \$(gcloud auth print-access-token)' \\"
                          echo "    -H 'Content-Type: application/json' \\"
                          echo "    -d '{\"trafficConfig\":{\"trafficSplitManual\":{\"targets\":[{\"runtimeRevisionName\":\"$OLD_REVISION\",\"percent\":100}]}}}' \\"
                          echo "    '${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config'"

                        else
                          echo "=== ROLLING BACK: Smoke test failed ==="
                          echo "Restoring 100% traffic to old revision: $OLD_REVISION"

                          curl -s -X PATCH \
                            -H "Authorization: Bearer $TOKEN" \
                            -H "Content-Type: application/json" \
                            -d "{
                              \"trafficConfig\": {
                                \"trafficSplitManual\": {
                                  \"targets\": [
                                    {\"runtimeRevisionName\": \"$OLD_REVISION\", \"percent\": 100}
                                  ]
                                }
                              }
                            }" \
                            "${API_BASE}/projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/reasoningEngines/${RESOURCE_ID}?update_mask=traffic_config"

                          echo ""
                          echo "Pipeline FAILED. Rolled back to previous revision."
                          echo "Resource: $RESOURCE_NAME"
                          echo "Active revision (rolled back): $OLD_REVISION"
                          echo "Failed revision: $NEW_REVISION"
                          exit 1
                        fi
